name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Validate docker-compose.yml
  # Checks YAML syntax, env-var substitution, and
  # that .env is not accidentally committed.
  # ──────────────────────────────────────────────
  validate-compose:
    name: Validate Compose config
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Ensure .env is not committed
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "::error::.env is tracked by git — remove it with: git rm --cached .env"
            exit 1
          fi
          echo ".env is correctly gitignored"

      - name: Create .env from template
        run: cp .env.example .env

      - name: Validate docker-compose.yml (syntax + env substitution)
        run: docker compose config --quiet

  # ──────────────────────────────────────────────
  # Job 2: Build Python service images
  # Catches Dockerfile errors and pip install
  # failures for simulator and bridge.
  # ──────────────────────────────────────────────
  build-images:
    name: Build Python images
    runs-on: ubuntu-latest
    needs: validate-compose

    steps:
      - uses: actions/checkout@v4

      - name: Create .env from template
        run: cp .env.example .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build simulator image
        uses: docker/build-push-action@v6
        with:
          context: ./sensor_simulator
          push: false
          cache-from: type=gha,scope=simulator
          cache-to: type=gha,mode=max,scope=simulator

      - name: Build bridge image
        uses: docker/build-push-action@v6
        with:
          context: ./mqtt_bridge
          push: false
          cache-from: type=gha,scope=bridge
          cache-to: type=gha,mode=max,scope=bridge
