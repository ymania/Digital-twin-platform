name: PR Commands

# Slash commands — comment on a PR (repo owner only):
#   /claude approve   submit a GitHub approval review
#   /claude merge     approve then squash-merge
#   /claude resolve   resolve merge conflicts with Claude and push

on:
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  contents: write

jobs:
  handle:
    if: github.event.issue.pull_request != null && github.event.comment.user.login == github.repository_owner && (contains(github.event.comment.body, '/claude approve') || contains(github.event.comment.body, '/claude merge') || contains(github.event.comment.body, '/claude resolve'))
    runs-on: ubuntu-latest

    steps:
      - name: Acknowledge command (👀)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            --method POST -f content=eyes

      - name: Determine action
        id: cmd
        run: |
          BODY="${{ github.event.comment.body }}"
          if   [[ "$BODY" == *"/claude merge"*   ]]; then echo "action=merge"   >> $GITHUB_OUTPUT
          elif [[ "$BODY" == *"/claude approve"* ]]; then echo "action=approve" >> $GITHUB_OUTPUT
          elif [[ "$BODY" == *"/claude resolve"* ]]; then echo "action=resolve" >> $GITHUB_OUTPUT
          fi

      - name: Get PR details
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATA=$(gh pr view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --json number,title,headRefName,baseRefName)
          echo "number=$(echo "$DATA" | python3 -c "import sys,json; print(json.load(sys.stdin)['number'])")"      >> $GITHUB_OUTPUT
          echo "head=$(echo   "$DATA" | python3 -c "import sys,json; print(json.load(sys.stdin)['headRefName'])")" >> $GITHUB_OUTPUT
          echo "base=$(echo   "$DATA" | python3 -c "import sys,json; print(json.load(sys.stdin)['baseRefName'])")" >> $GITHUB_OUTPUT

      # ── /claude approve & /claude merge ──────────────────────────────────────

      - name: Submit GitHub approval
        if: steps.cmd.outputs.action == 'approve' || steps.cmd.outputs.action == 'merge'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.number }}/reviews \
            --method POST \
            -f event=APPROVE \
            -f body="Approved via /claude ${{ steps.cmd.outputs.action }}."

      - name: Squash-merge PR
        if: steps.cmd.outputs.action == 'merge'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.pr.outputs.number }} \
            --repo ${{ github.repository }} \
            --squash \
            --delete-branch

      # ── /claude resolve ───────────────────────────────────────────────────────

      - name: Checkout repository
        if: steps.cmd.outputs.action == 'resolve'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        if: steps.cmd.outputs.action == 'resolve'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"

      - name: Merge and resolve conflicts
        if: steps.cmd.outputs.action == 'resolve'
        id: resolve
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HEAD_BRANCH: ${{ steps.pr.outputs.head }}
          BASE_BRANCH: ${{ steps.pr.outputs.base }}
        run: |
          git remote set-url origin \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git checkout "$HEAD_BRANCH"
          git fetch origin "$BASE_BRANCH"

          if git merge "origin/$BASE_BRANCH" --no-edit; then
            echo "result=clean" >> $GITHUB_OUTPUT
          elif [[ -z "$ANTHROPIC_API_KEY" ]]; then
            git merge --abort
            echo "result=no_key" >> $GITHUB_OUTPUT
          else
            python3 .github/scripts/pr_resolve.py
            git add .
            git commit -m "resolve: merge conflicts with $BASE_BRANCH (via /claude resolve)"
            git push origin "$HEAD_BRANCH"
            echo "result=resolved" >> $GITHUB_OUTPUT
          fi

      # ── Post result comment ───────────────────────────────────────────────────

      - name: Post result comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr.outputs.number }}"
          case "${{ steps.cmd.outputs.action }}" in
            approve)
              MSG="Approved via \`/claude approve\`." ;;
            merge)
              MSG="Approved and squash-merged via \`/claude merge\`. Branch deleted." ;;
            resolve)
              case "${{ steps.resolve.outputs.result }}" in
                clean)
                  MSG="No conflicts — branch merges cleanly into \`${{ steps.pr.outputs.base }}\`." ;;
                no_key)
                  MSG="\`/claude resolve\` requires \`ANTHROPIC_API_KEY\` to be set as a repository secret." ;;
                resolved)
                  FILES=$(sed 's/^/- /' resolved.txt 2>/dev/null || echo "- (see diff)")
                  MSG="Conflicts resolved and pushed to \`${{ steps.pr.outputs.head }}\`.

          **Files resolved:**
          ${FILES}" ;;
              esac ;;
          esac
          gh pr comment "$PR" --body "$MSG"

      - name: Mark command done (✅)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            --method POST -f content="+1"
