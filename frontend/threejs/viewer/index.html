<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数字孪生 · 实时状态监控</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0e17;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      color: #e0e5f0;
    }
    #scene-container { width: 100vw; height: 100vh; display: block; }

    /* HUD overlay — 左下角状态摘要 */
    #hud {
      position: fixed;
      bottom: 24px;
      left: 24px;
      background: rgba(10, 14, 23, 0.85);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 16px 20px;
      min-width: 220px;
      font-size: 13px;
      line-height: 1.6;
    }
    #hud .title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.3);
      margin-bottom: 8px;
    }
    #hud .stat { display: flex; justify-content: space-between; }
    #hud .stat .label { color: rgba(255,255,255,0.5); }
    #hud .stat .value { font-weight: 600; }
    .count-normal { color: #4ade80; }
    .count-warning { color: #facc15; }
    .count-alarm { color: #ef4444; }
    .count-offline { color: #6b7280; }

    /* 右上角连接状态 */
    #conn-status {
      position: fixed;
      top: 20px;
      right: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
    }
    #conn-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ef4444;
      transition: background 0.4s;
    }
    #conn-dot.connected { background: #4ade80; }
    #conn-dot.connecting { background: #facc15; }

    /* 资产标签 tooltip */
    #tooltip {
      position: fixed;
      display: none;
      background: rgba(10, 14, 23, 0.92);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      pointer-events: none;
      z-index: 100;
    }
    #tooltip .guid { font-weight: 600; color: #e0e5f0; margin-bottom: 2px; }
    #tooltip .detail { color: rgba(255,255,255,0.5); }
  </style>
</head>
<body>
  <div id="scene-container"></div>

  <div id="hud">
    <div class="title">全场状态摘要</div>
    <div class="stat">
      <span class="label">Normal</span>
      <span class="value count-normal" id="c-normal">0</span>
    </div>
    <div class="stat">
      <span class="label">Warning</span>
      <span class="value count-warning" id="c-warning">0</span>
    </div>
    <div class="stat">
      <span class="label">Alarm</span>
      <span class="value count-alarm" id="c-alarm">0</span>
    </div>
    <div class="stat">
      <span class="label">Offline</span>
      <span class="value count-offline" id="c-offline">0</span>
    </div>
  </div>

  <div id="conn-status">
    <span id="conn-dot"></span>
    <span id="conn-label">未连接</span>
  </div>

  <div id="tooltip">
    <div class="guid" id="tip-guid">-</div>
    <div class="detail" id="tip-detail">-</div>
  </div>

  <!-- Three.js from CDN -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
