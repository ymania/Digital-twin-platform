<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Room Digital Twin — 3D</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; font-family: 'Courier New', monospace; overflow: hidden; color: #e0e0e0; }
    #canvas-container { position: fixed; inset: 0; }

    #title {
      position: fixed; top: 20px; left: 20px;
      font-size: 16px; font-weight: bold; color: #58a6ff;
      text-shadow: 0 0 12px rgba(88,166,255,0.5); letter-spacing: 2px; pointer-events: none;
    }
    #title span { display: block; font-size: 10px; color: #8b949e; margin-top: 3px; letter-spacing: 1px; }

    #sensor-panel {
      position: fixed; top: 20px; right: 20px;
      background: rgba(13,17,23,0.88); border: 1px solid #30363d;
      border-radius: 10px; padding: 16px 18px; min-width: 210px; backdrop-filter: blur(10px);
    }
    .panel-title { font-size: 10px; color: #8b949e; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #21262d; }
    .metric { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #21262d; }
    .metric:last-child { border-bottom: none; }
    .metric-label { font-size: 11px; color: #8b949e; }
    .metric-value { font-size: 14px; font-weight: bold; transition: color 0.6s; }

    #mqtt-status {
      position: fixed; bottom: 20px; left: 20px;
      display: flex; align-items: center; gap: 8px; font-size: 11px; color: #8b949e;
      background: rgba(13,17,23,0.8); padding: 8px 14px; border-radius: 20px; border: 1px solid #21262d;
    }
    #mqtt-dot { width: 8px; height: 8px; border-radius: 50%; background: #f85149; transition: background 0.5s, box-shadow 0.5s; }
    #mqtt-dot.connected { background: #3fb950; box-shadow: 0 0 7px #3fb950; }

    #controls-hint { position: fixed; bottom: 20px; right: 20px; font-size: 10px; color: #3d4450; text-align: right; line-height: 1.8; pointer-events: none; }
  </style>
</head>
<body>

<div id="canvas-container"></div>

<div id="title">ROOM DIGITAL TWIN<span>LIVE 3D VIEW</span></div>

<div id="sensor-panel">
  <div class="panel-title">Live Sensors · room/1</div>
  <div class="metric"><span class="metric-label">Temperature</span><span class="metric-value" id="val-temp">--</span></div>
  <div class="metric"><span class="metric-label">Humidity</span><span class="metric-value" id="val-humidity">--</span></div>
  <div class="metric"><span class="metric-label">Fan</span><span class="metric-value" id="val-fan-state">--</span></div>
  <div class="metric"><span class="metric-label">Fan Speed</span><span class="metric-value" id="val-fan-speed">--</span></div>
  <div class="metric"><span class="metric-label">Light</span><span class="metric-value" id="val-light">--</span></div>
  <div class="metric"><span class="metric-label">Power</span><span class="metric-value" id="val-power">--</span></div>
</div>

<div id="mqtt-status">
  <div id="mqtt-dot"></div>
  <span id="mqtt-label">Connecting…</span>
</div>

<div id="controls-hint">drag · rotate &nbsp;|&nbsp; scroll · zoom<br>right-drag · pan</div>

<script src="https://unpkg.com/mqtt@5.3.4/dist/mqtt.min.js"></script>

<script type="importmap">
{
  "imports": {
    "three":         "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Live state (updated by MQTT) ─────────────────────────────────────────────
const state = { temperature: 22, humidity: 55, fanActive: 0, fanSpeedRpm: 0, lightLux: 300, powerWatts: 5 };

// ── Renderer ─────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.getElementById('canvas-container').appendChild(renderer.domElement);

// ── Scene / Camera / Controls ────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d1117);
scene.fog = new THREE.FogExp2(0x101520, 0.032);

const camera = new THREE.PerspectiveCamera(52, window.innerWidth / window.innerHeight, 0.1, 80);
camera.position.set(7, 5.5, 8);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.4, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.minDistance = 2;
controls.maxDistance = 20;
controls.maxPolarAngle = Math.PI / 2 + 0.12;
controls.update();

// ── Materials ────────────────────────────────────────────────────────────────
const M = {
  floor:       new THREE.MeshLambertMaterial({ color: 0xc8a87a }),
  wall:        new THREE.MeshLambertMaterial({ color: 0xe8e0d8 }),
  ceiling:     new THREE.MeshLambertMaterial({ color: 0xf4f0ec }),
  skirting:    new THREE.MeshLambertMaterial({ color: 0xddd5c8 }),
  fanBody:     new THREE.MeshLambertMaterial({ color: 0x4a4a5a }),
  blade:       new THREE.MeshLambertMaterial({ color: 0xd4a574 }),
  glass:       new THREE.MeshStandardMaterial({ color: 0x99ccff, emissive: 0x3366aa, emissiveIntensity: 0.3, transparent: true, opacity: 0.45 }),
  windowFrame: new THREE.MeshLambertMaterial({ color: 0x8b7355 }),
  deskTop:     new THREE.MeshLambertMaterial({ color: 0xa07850 }),
  deskLeg:     new THREE.MeshLambertMaterial({ color: 0x806040 }),
  chairSeat:   new THREE.MeshLambertMaterial({ color: 0x4a7ac8 }),
  chairBack:   new THREE.MeshLambertMaterial({ color: 0x3a6ab8 }),
  chairLeg:    new THREE.MeshLambertMaterial({ color: 0x333344 }),
  thermTrack:  new THREE.MeshLambertMaterial({ color: 0x2a2a3a }),
  thermFill:   new THREE.MeshLambertMaterial({ color: 0x4488ff }),
  bulb:        new THREE.MeshStandardMaterial({ color: 0xffffcc, emissive: 0xffffcc, emissiveIntensity: 2.0 }),
};

// Helper: create a mesh, set position, add to parent
function mesh(geom, mat, parent, px = 0, py = 0, pz = 0, castShadow = false, receiveShadow = false) {
  const m = new THREE.Mesh(geom, mat);
  m.position.set(px, py, pz);
  if (castShadow)   m.castShadow   = true;
  if (receiveShadow) m.receiveShadow = true;
  parent.add(m);
  return m;
}

// ── Room (8 × 3.2 × 6) ───────────────────────────────────────────────────────
const RW = 8, RD = 6, RH = 3.2;

mesh(new THREE.BoxGeometry(RW, 0.08, RD), M.floor,   scene, 0, 0,    0,    false, true);
mesh(new THREE.BoxGeometry(RW, 0.08, RD), M.ceiling, scene, 0, RH,   0);

// Walls: left, right, back, front
[
  [0.08, RH, RD, -RW/2, RH/2, 0],
  [0.08, RH, RD,  RW/2, RH/2, 0],
  [RW, RH, 0.08,  0, RH/2, -RD/2],
  [RW, RH, 0.08,  0, RH/2,  RD/2],
].forEach(([w, h, d, px, py, pz]) => mesh(new THREE.BoxGeometry(w, h, d), M.wall, scene, px, py, pz, false, true));

// Skirting boards
[
  [RW, 0.12, 0.04,  0, 0.06, -RD/2 + 0.02],
  [RW, 0.12, 0.04,  0, 0.06,  RD/2 - 0.02],
  [0.04, 0.12, RD, -RW/2 + 0.02, 0.06, 0],
  [0.04, 0.12, RD,  RW/2 - 0.02, 0.06, 0],
].forEach(([w, h, d, px, py, pz]) => mesh(new THREE.BoxGeometry(w, h, d), M.skirting, scene, px, py, pz));

// ── Window (back wall, left) ─────────────────────────────────────────────────
const winGroup = new THREE.Group();
winGroup.position.set(-2, 1.9, -RD/2 + 0.01);
scene.add(winGroup);

mesh(new THREE.BoxGeometry(2.0, 1.7, 0.10), M.windowFrame, winGroup);

const glass = new THREE.Mesh(new THREE.BoxGeometry(1.7, 1.4, 0.05), M.glass);
glass.position.set(0, 0, 0.04);
winGroup.add(glass);

// cross bars
mesh(new THREE.BoxGeometry(1.7, 0.06, 0.07), M.windowFrame, winGroup, 0, 0, 0.04);
mesh(new THREE.BoxGeometry(0.06, 1.4, 0.07), M.windowFrame, winGroup, 0, 0, 0.04);

// ── Desk ─────────────────────────────────────────────────────────────────────
const deskGroup = new THREE.Group();
deskGroup.position.set(1.8, 0, -RD/2 + 0.6);
scene.add(deskGroup);

mesh(new THREE.BoxGeometry(2.0, 0.06, 0.9), M.deskTop, deskGroup, 0, 0.76, 0);

[[-0.9, -0.425], [0.9, -0.425], [-0.9, 0.425], [0.9, 0.425]].forEach(([x, z]) => {
  mesh(new THREE.BoxGeometry(0.06, 0.75, 0.06), M.deskLeg, deskGroup, x, 0.375, z, true);
});

// ── Chair ─────────────────────────────────────────────────────────────────────
const chairGroup = new THREE.Group();
chairGroup.position.set(1.8, 0, -RD/2 + 1.7);
scene.add(chairGroup);

mesh(new THREE.BoxGeometry(0.52, 0.06, 0.48), M.chairSeat, chairGroup, 0, 0.48,  0);
mesh(new THREE.BoxGeometry(0.52, 0.50, 0.06), M.chairBack, chairGroup, 0, 0.79, -0.21);

[[-0.22, -0.20], [0.22, -0.20], [-0.22, 0.20], [0.22, 0.20]].forEach(([x, z]) => {
  mesh(new THREE.BoxGeometry(0.05, 0.47, 0.05), M.chairLeg, chairGroup, x, 0.235, z);
});

// ── Ceiling Fan ───────────────────────────────────────────────────────────────
const fanGroup = new THREE.Group();
fanGroup.position.set(0, RH, 0);
scene.add(fanGroup);

mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.38, 8), M.fanBody, fanGroup, 0, -0.19, 0);

const motorMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.13, 0.24, 16), M.fanBody);
motorMesh.position.set(0, -0.5, 0);
motorMesh.castShadow = true;
fanGroup.add(motorMesh);

// Blade assembly — only this group rotates
const bladesGroup = new THREE.Group();
bladesGroup.position.set(0, -0.52, 0);
fanGroup.add(bladesGroup);

for (let i = 0; i < 4; i++) {
  const blade = new THREE.Mesh(new THREE.BoxGeometry(1.35, 0.022, 0.24), M.blade);
  blade.position.set(0.67, 0, 0);
  blade.rotation.z = 0.05;
  blade.castShadow = true;
  const holder = new THREE.Group();
  holder.rotation.y = i * Math.PI / 2;
  holder.add(blade);
  bladesGroup.add(holder);
}

// Light kit under motor
const lightKit = new THREE.Mesh(new THREE.SphereGeometry(0.09, 10, 8), M.bulb);
lightKit.position.set(0, -0.65, 0);
fanGroup.add(lightKit);

// ── Wall thermometer (right wall) ────────────────────────────────────────────
const TH = 1.1, TW = 0.13;
const thermGroup = new THREE.Group();
thermGroup.position.set(RW / 2 - 0.05, 1.6, 0.5);
thermGroup.rotation.y = -Math.PI / 2;
scene.add(thermGroup);

mesh(new THREE.BoxGeometry(TW, TH, 0.04), M.thermTrack, thermGroup);

const thermFill = new THREE.Mesh(new THREE.BoxGeometry(TW - 0.04, TH - 0.04, 0.06), M.thermFill.clone());
thermGroup.add(thermFill);

// ── Lighting ─────────────────────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0xffffff, 0.45);
scene.add(ambientLight);

const ceilingLight = new THREE.PointLight(0xfff8e8, 2.8, 14, 1.4);
ceilingLight.position.set(0, RH - 0.7, 0);
ceilingLight.castShadow = true;
ceilingLight.shadow.mapSize.set(512, 512);
scene.add(ceilingLight);

const sunLight = new THREE.DirectionalLight(0xfff0d0, 0.9);
sunLight.position.set(-4, 6, -5);
sunLight.castShadow = true;
scene.add(sunLight);

// ── Temperature → colour ─────────────────────────────────────────────────────
const C_COLD = new THREE.Color(0x4477ff), C_NEU = new THREE.Color(0xffffff),
      C_WARM = new THREE.Color(0xff8833), C_HOT  = new THREE.Color(0xff2200);

function tempToColor(t) {
  const c = new THREE.Color();
  if (t <= 20) return c.copy(C_COLD);
  if (t <= 24) return c.lerpColors(C_COLD, C_NEU,  (t - 20) / 4);
  if (t <= 28) return c.lerpColors(C_NEU,  C_WARM, (t - 24) / 4);
  return c.lerpColors(C_WARM, C_HOT, Math.min(1, (t - 28) / 4));
}

// ── Apply state → scene ───────────────────────────────────────────────────────
function applyState() {
  const col = tempToColor(state.temperature);
  ambientLight.color.copy(col);

  const lf = Math.min(1, state.lightLux / 450);
  sunLight.intensity = 0.15 + lf * 1.0;
  M.glass.emissiveIntensity = 0.05 + lf * 0.85;

  ceilingLight.intensity = state.fanActive ? 3.2 : 2.5;

  // Thermometer fill anchored at bottom
  const H    = TH - 0.04;
  const fill = Math.max(0.02, Math.min(1, (state.temperature - 10) / 25));
  thermFill.scale.y = fill;
  thermFill.position.y = -(H / 2) * (1 - fill);
  thermFill.material.color.copy(col);
}

// ── UI panel ─────────────────────────────────────────────────────────────────
function updatePanel() {
  const t = state.temperature;
  const tEl = document.getElementById('val-temp');
  tEl.textContent = t.toFixed(1) + ' °C';
  tEl.style.color  = t > 26 ? '#f85149' : t < 20 ? '#58a6ff' : '#3fb950';

  document.getElementById('val-humidity').textContent  = state.humidity.toFixed(1) + ' %';
  const fsEl = document.getElementById('val-fan-state');
  fsEl.textContent = state.fanActive ? 'ON' : 'OFF';
  fsEl.style.color  = state.fanActive ? '#3fb950' : '#f85149';
  document.getElementById('val-fan-speed').textContent = state.fanSpeedRpm + ' rpm';
  document.getElementById('val-light').textContent     = state.lightLux.toFixed(0) + ' lux';
  document.getElementById('val-power').textContent     = state.powerWatts.toFixed(1) + ' W';
}

// ── MQTT ─────────────────────────────────────────────────────────────────────
const mqttDot   = document.getElementById('mqtt-dot');
const mqttLabel = document.getElementById('mqtt-label');

const mqttClient = mqtt.connect('ws://localhost:9001', {
  clientId: 'room-viz-' + Math.random().toString(16).slice(2, 10),
  reconnectPeriod: 2000,
});

mqttClient.on('connect', () => {
  mqttDot.classList.add('connected');
  mqttLabel.textContent = 'Connected · MQTT';
  mqttClient.subscribe('room/#');
});
mqttClient.on('offline',     ()    => { mqttDot.classList.remove('connected'); mqttLabel.textContent = 'Disconnected'; });
mqttClient.on('reconnect',   ()    => { mqttLabel.textContent = 'Reconnecting…'; });
mqttClient.on('error',       (err) => console.warn('[mqtt]', err.message));

mqttClient.on('message', (topic, payload) => {
  try {
    const val   = JSON.parse(payload.toString()).value;
    const field = topic.split('/')[1];
    switch (field) {
      case 'temperature': state.temperature = parseFloat(val); break;
      case 'humidity':    state.humidity    = parseFloat(val); break;
      case 'fan_state':   state.fanActive   = val === 'ON' ? 1 : 0; break;
      case 'fan_speed':   state.fanSpeedRpm = parseInt(val, 10); break;
      case 'light':       state.lightLux    = parseFloat(val); break;
      case 'power':       state.powerWatts  = parseFloat(val); break;
    }
    applyState();
    updatePanel();
  } catch (e) { console.warn('[mqtt] parse error', topic, e); }
});

// ── Animation loop ────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let fanAngularVel = 0;

function animate() {
  requestAnimationFrame(animate);
  const delta = Math.min(clock.getDelta(), 0.05);

  // Smooth spin-up / spin-down
  const targetVel = (state.fanActive && state.fanSpeedRpm > 0) ? (state.fanSpeedRpm / 1200) * 8.0 : 0;
  fanAngularVel += (targetVel - fanAngularVel) * Math.min(1, delta * 1.5);
  bladesGroup.rotation.y += fanAngularVel * delta;

  controls.update();
  renderer.render(scene, camera);
}

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

applyState();
updatePanel();
animate();
</script>
</body>
</html>
