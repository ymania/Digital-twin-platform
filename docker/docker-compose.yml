x-common: &common
  restart: unless-stopped
  networks:
    - dt-net

services:
  # ─── 消息层 ───
  emqx:
    image: emqx:5.8
    <<: *common
    container_name: dt-emqx
    hostname: emqx
    ports:
      - "1883:1883"    # MQTT
      - "8083:8083"    # WS
      - "18083:18083"  # Dashboard
    environment:
      EMQX_NODE__NAME: emqx@127.0.0.1
      EMQX_DASHBOARD__DEFAULT_PASSWORD: emqx_pass_2025
    volumes:
      - emqx-data:/opt/emqx/data
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 10s
      retries: 5

  # ─── 物理仿真（来自 room-digital-twin） ───
  simulator:
    build:
      context: /home/qmyyc/room-digital-twin/sensor_simulator
      dockerfile: Dockerfile
      args:
        http_proxy: ""
        https_proxy: ""
        HTTP_PROXY: ""
        HTTPS_PROXY: ""
    <<: *common
    container_name: dt-simulator
    depends_on:
      emqx:
        condition: service_healthy
    environment:
      MQTT_HOST: emqx
      MQTT_PORT: "1883"

  # ─── MQTT → InfluxDB 桥接（来自 room-digital-twin） ───
  bridge:
    build:
      context: /home/qmyyc/room-digital-twin/mqtt_bridge
      dockerfile: Dockerfile
      args:
        http_proxy: ""
        https_proxy: ""
        HTTP_PROXY: ""
        HTTPS_PROXY: ""
    <<: *common
    container_name: dt-bridge
    depends_on:
      emqx:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    environment:
      MQTT_HOST: emqx
      MQTT_PORT: "1883"
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: dt_influx_token_2025
      INFLUXDB_ORG: dt_platform
      INFLUXDB_BUCKET: telemetry

  # ─── 时序层 ───
  influxdb:
    image: influxdb:2.7-alpine
    <<: *common
    container_name: dt-influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: influx_pass_2025
      DOCKER_INFLUXDB_INIT_ORG: dt_platform
      DOCKER_INFLUXDB_INIT_BUCKET: telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: dt_influx_token_2025
    volumes:
      - influxdb-data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      retries: 5

  # ─── 关系层 ───
  postgres:
    image: postgres:16-alpine
    <<: *common
    container_name: dt-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: dt_platform
      POSTGRES_USER: dt_user
      POSTGRES_PASSWORD: dt_pass_2025
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../database/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dt_user -d dt_platform"]
      interval: 5s
      retries: 5

  # ─── 孪生服务层 ───
  backend:
    build:
      context: ../backend/FastAPI
      dockerfile: Dockerfile
      args:
        http_proxy: ""
        https_proxy: ""
    <<: *common
    container_name: dt-backend
    ports:
      - "8000:8000"
    volumes:
      - ../frontend/threejs/viewer:/app/viewer
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: dt_platform
      POSTGRES_USER: dt_user
      POSTGRES_PASSWORD: dt_pass_2025
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: dt_influx_token_2025
      INFLUXDB_ORG: dt_platform
      INFLUXDB_BUCKET: telemetry
      MQTT_HOST: emqx
      MQTT_PORT: 1883
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy

networks:
  dt-net:
    driver: bridge

volumes:
  emqx-data:
  influxdb-data:
  postgres-data:
