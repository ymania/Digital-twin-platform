version: "3.8"

x-common: &common
  restart: unless-stopped
  networks:
    - digital-twin_default  # 连接到底座网络

services:
  emqx:
    image: emqx:5.8
    <<: *common
    container_name: dt-emqx
    hostname: dt-emqx
    ports:
      - "1884:1883"
      - "8084:8083"
      - "18084:18083"
    environment:
      EMQX_NODE__NAME: emqx@127.0.0.1
      EMQX_MQTT__MAX_TOPIC_ALIAS: 100
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 10s
      retries: 5

  postgres:
    image: postgres:16-alpine
    <<: *common
    container_name: dt-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: dt_platform
      POSTGRES_USER: dt_user
      POSTGRES_PASSWORD: dt_pass_2025
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../database/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dt_user -d dt_platform"]
      interval: 5s
      retries: 5

  influxdb:
    image: influxdb:2.7-alpine
    <<: *common
    container_name: dt-influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: influx_pass_2025
      DOCKER_INFLUXDB_INIT_ORG: dt_platform
      DOCKER_INFLUXDB_INIT_BUCKET: telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: dt_influx_token_2025
    volumes:
      - influxdb-data:/var/lib/influxdb2

  backend:
    build:
      context: ../backend/FastAPI
      dockerfile: Dockerfile
      args:
        http_proxy: ""
        https_proxy: ""
    <<: *common
    container_name: dt-backend
    ports:
      - "8000:8000"
    volumes:
      - ../frontend/threejs/viewer:/app/viewer
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: dt_platform
      POSTGRES_USER: dt_user
      POSTGRES_PASSWORD: dt_pass_2025
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: dt_influx_token_2025
      INFLUXDB_ORG: dt_platform
      INFLUXDB_BUCKET: telemetry
      MQTT_HOST: mosquitto    # 连接到底座的 mosquitto
      MQTT_PORT: 1883
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_started

volumes:
  postgres-data:
  influxdb-data:

networks:
  digital-twin_default:
    external: true  # 使用底座创建的网络
